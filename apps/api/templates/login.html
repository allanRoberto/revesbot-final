<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
    }

    .login-card {
      background: #fff;
      padding: 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
    }

    .error {
      color: red;
      background: #ffe2ee;
      padding: 10px 20px;
      text-align: center;
      font-size: 14px;
      border-radius: 5px;
      margin: 10px;
    }

    .login-card h4 {
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #2c5364;
      text-align: center;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #2c5364;
    }

    .btn-primary {
      background-color: #2c5364;
      border-color: #2c5364;
    }

    .btn-primary:hover {
      background-color: #1b2d3a;
      border-color: #1b2d3a;
    }

    .link-welcome {
        margin: 10px auto 5px auto;
    text-align: center;
    width: 100%;
    display: flex
;
    justify-content: center;
    text-decoration: none;
    font-size: 12px;
    color: #999;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h4>Acesso ao Painel</h4>
    <form id="login-form">
      <div class="mb-3">
        <label for="username" class="form-label">Usuário</label>
        <input type="text" class="form-control" id="username" name="username" required>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Senha</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
      <hr/>
      <a href="/register" class="link-welcome">Registre-se agora</a>
      <a href="/recovery" class="link-welcome">Recuperar sua senha</a>

    

      <p id="login-message" class="default"></p>

     
    </form>
  </div>
  <script>
    const form = document.getElementById("login-form");
  
    form.addEventListener("submit", async function (e) {
      e.preventDefault();
  
      const response = await fetch("/login", {
        method: "POST",
        body: new FormData(form),
      });
  
      if (response.redirected) {
        window.location.href = response.url;
      } else {
        const data = await response.json();
        document.getElementById("login-message").textContent = data.detail || "Erro ao fazer login.";
        document.getElementById("login-message").className = "error";
      }
    });
  </script>
     
</body>
</html>
