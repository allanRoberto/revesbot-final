<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhe da Run de Ocorrencias</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #0f172a;
      --accent-soft: #f1f5f9;
      --success: #16a34a;
      --success-soft: rgba(22, 163, 74, 0.12);
      --danger: #dc2626;
      --danger-soft: rgba(220, 38, 38, 0.12);
      --warning: #d97706;
      --warning-soft: rgba(217, 119, 6, 0.12);
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.06), 0 16px 40px rgba(15, 23, 42, 0.05);
      --red: #dc2626;
      --black: #111827;
      --green: #16a34a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
    }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: 36px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 980px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .panel {
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button, a.button-link {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover, a.button-link:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.75; cursor: wait; transform: none; }

    .primary { background: var(--accent); color: white; }
    .secondary { background: #ffffff; color: var(--text); border: 1px solid var(--border); }
    .danger { background: var(--danger-soft); color: var(--danger); }

    .status {
      min-height: 20px;
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }
    .status.error { color: var(--danger); }
    .status.success { color: var(--accent); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #ffffff;
      padding: 16px;
    }

    .card .label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 30px;
      line-height: 1;
      font-weight: 800;
    }

    .card .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.running,
    .badge.finished,
    .badge.completed,
    .badge.resolved,
    .badge.success {
      color: var(--success);
      background: var(--success-soft);
    }

    .badge.pending,
    .badge.scheduled {
      color: var(--warning);
      background: var(--warning-soft);
    }

    .badge.failed,
    .badge.cancelled_inverted,
    .badge.cancelled,
    .badge.stopped,
    .badge.idle {
      color: var(--danger);
      background: var(--danger-soft);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 18px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .chip .count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .chip-number {
      min-width: 24px;
      min-height: 24px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      padding: 0 6px;
      font-weight: 800;
    }

    .num-red { background: var(--red); }
    .num-black { background: var(--black); }
    .num-green { background: var(--green); }

    .attempt-track {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .attempt-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #d8ddd9;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.06);
    }

    .attempt-dot.hit { background: var(--green); }
    .attempt-dot.miss { background: var(--danger); }
    .attempt-dot.pending { background: #d8ddd9; }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .muted { color: var(--muted); }

    .empty {
      padding: 16px;
      border-radius: 16px;
      border: 1px dashed var(--border);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.72);
      font-size: 14px;
    }

    .timing-note {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      margin-top: 18px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 13px;
      color: var(--text);
      background: #ffffff;
      font: inherit;
    }

    .distribution-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      min-height: 44px;
    }

    .distribution-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      background: #ffffff;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
    }

    .distribution-chip strong {
      font-weight: 700;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      .page { padding: 18px 12px 34px; }
      .hero, .panel { padding: 18px; }
      h1 { font-size: 30px; }
      table { min-width: 760px; }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="eyebrow">Occurrence Run</div>
      <h1>Detalhe da execucao</h1>
      <p id="hero-copy">
        Carregando informacoes da run...
      </p>
      <div class="actions">
        <a class="button-link secondary" href="/occurrences-runs">Voltar para a listagem</a>
        <a class="button-link secondary" href="/occurrences-lab">Voltar ao lab</a>
        <button id="delete-btn" class="danger" style="display:none;">Excluir run</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <div class="stack">
      <section class="panel">
        <h2>Resumo</h2>
        <div id="summary-cards" class="cards"></div>
        <div class="toolbar">
          <div class="field">
            <label for="first-hit-filter">Filtrar por primeiro acerto</label>
            <select id="first-hit-filter">
              <option value="">Todos os eventos</option>
            </select>
          </div>
          <div>
            <label style="display:block; margin-bottom:8px; color:var(--muted); font-size:13px; font-weight:600;">Distribuicao do primeiro acerto</label>
            <div id="first-hit-distribution" class="distribution-wrap"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Eventos da run</h2>
        <div id="events-empty" class="empty">Nenhum evento carregado.</div>
        <div id="events-content" style="display:none;">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Criado em</th>
                  <th>Gatilho (Ancora)</th>
                  <th>Ranking</th>
                  <th>Status</th>
                  <th>Acerto</th>
                  <th>Primeiro acerto em</th>
                  <th>Resumo</th>
                </tr>
              </thead>
              <tbody id="events-body"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const redNumbers = new Set([1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36]);
    const runId = decodeURIComponent(window.location.pathname.split('/').filter(Boolean).pop() || '');
    const heroCopy = document.getElementById('hero-copy');
    const statusEl = document.getElementById('status');
    const summaryCardsEl = document.getElementById('summary-cards');
    const eventsEmptyEl = document.getElementById('events-empty');
    const eventsContentEl = document.getElementById('events-content');
    const eventsBody = document.getElementById('events-body');
    const deleteBtn = document.getElementById('delete-btn');
    const firstHitFilter = document.getElementById('first-hit-filter');
    const firstHitDistributionEl = document.getElementById('first-hit-distribution');

    const state = {
      run: null,
      events: [],
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function safeNumber(value, fallback = 0) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function pct(value) {
      return `${(safeNumber(value) * 100).toFixed(2)}%`;
    }

    function setStatus(message, tone = '') {
      statusEl.className = `status ${tone}`.trim();
      statusEl.textContent = message || '';
    }

    function dateTime(value) {
      if (!value) return '-';
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return String(value);
      return parsed.toLocaleString('pt-BR');
    }

    function numberClass(value) {
      const number = safeNumber(value, -1);
      if (number === 0) return 'num-green';
      return redNumbers.has(number) ? 'num-red' : 'num-black';
    }

    function numberBubble(value) {
      const number = safeNumber(value, -1);
      return `<span class="chip-number ${numberClass(number)}">${escapeHtml(number)}</span>`;
    }

    function badge(value) {
      const label = String(value || 'unknown');
      const tone = label.toLowerCase();
      return `<span class="badge ${escapeHtml(tone)}">${escapeHtml(label.replaceAll('_', ' '))}</span>`;
    }

    function rankingChips(items) {
      if (!Array.isArray(items) || !items.length) {
        return '<span class="muted">Sem ranking.</span>';
      }
      return items.map((item) => {
        const number = typeof item === 'object' ? item.number : item;
        const count = typeof item === 'object' ? item.count : null;
        return `
          <span class="chip">
            ${numberBubble(number)}
            <span>${escapeHtml(number)}</span>
            ${count !== null ? `<span class="count">${escapeHtml(count)}x</span>` : ''}
          </span>
        `;
      }).join('');
    }

    function getEventAttemptsWindow(event) {
      return safeNumber(event?.evaluation?.attempts_window, safeNumber(event?.attempts_window, 10));
    }

    function getEventAttempts(event) {
      if (Array.isArray(event?.evaluation?.attempts) && event.evaluation.attempts.length) {
        return event.evaluation.attempts;
      }
      return Array.isArray(event?.attempts) ? event.attempts : [];
    }

    function getEventHitAttempts(event) {
      if (Array.isArray(event?.evaluation?.hit_attempts) && event.evaluation.hit_attempts.length) {
        return event.evaluation.hit_attempts.map((value) => safeNumber(value, 0)).filter((value) => value > 0);
      }
      return Array.isArray(event?.hit_attempts) ? event.hit_attempts.map((value) => safeNumber(value, 0)).filter((value) => value > 0) : [];
    }

    function getFirstHitInfo(event) {
      const hitAttempts = getEventHitAttempts(event);
      const first = hitAttempts[0] || null;
      const nextGap = hitAttempts.length >= 2 ? hitAttempts[1] - hitAttempts[0] : null;
      return { first, nextGap };
    }

    function buildAttemptDots(event) {
      const attempts = getEventAttempts(event);
      const attemptsWindow = getEventAttemptsWindow(event);
      const attemptsByNumber = new Map(attempts.map((item) => [safeNumber(item.attempt, 0), item]));
      return Array.from({ length: attemptsWindow }, (_, index) => {
        const attemptNo = index + 1;
        const attempt = attemptsByNumber.get(attemptNo);
        let tone = 'pending';
        let title = `Jogada ${attemptNo}: pendente`;
        if (attempt) {
          tone = attempt.hit ? 'hit' : 'miss';
          title = `Jogada ${attemptNo}: ${attempt.hit ? 'acerto' : 'erro'}${attempt.number !== undefined ? ` (${attempt.number})` : ''}`;
        }
        return `<span class="attempt-dot ${tone}" title="${escapeHtml(title)}"></span>`;
      }).join('');
    }

    function computeRunTimingStats(events) {
      const firstHits = [];
      const secondGaps = [];
      (Array.isArray(events) ? events : []).forEach((event) => {
        const hitAttempts = getEventHitAttempts(event);
        if (hitAttempts.length >= 1) firstHits.push(hitAttempts[0]);
        if (hitAttempts.length >= 2) secondGaps.push(hitAttempts[1] - hitAttempts[0]);
      });
      const avg = (values) => values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : null;
      return {
        avgFirstHit: avg(firstHits),
        avgSecondGap: avg(secondGaps),
        firstHitSamples: firstHits.length,
        secondGapSamples: secondGaps.length,
      };
    }

    function computeFirstHitDistribution(events, attemptsWindow) {
      const maxAttempt = Math.max(
        1,
        safeNumber(attemptsWindow, 1),
        ...((Array.isArray(events) ? events : []).map((event) => {
          const first = getFirstHitInfo(event).first;
          return safeNumber(first, 0);
        }))
      );
      const byAttempt = {};
      for (let attempt = 1; attempt <= maxAttempt; attempt += 1) {
        byAttempt[String(attempt)] = 0;
      }
      let noHit = 0;
      (Array.isArray(events) ? events : []).forEach((event) => {
        const first = getFirstHitInfo(event).first;
        if (first) {
          byAttempt[String(first)] = safeNumber(byAttempt[String(first)], 0) + 1;
        } else {
          noHit += 1;
        }
      });
      return { byAttempt, noHit, maxAttempt };
    }

    function filteredEvents() {
      const filterValue = String(firstHitFilter.value || '').trim();
      if (!filterValue) return state.events.slice();
      if (filterValue === 'no-hit') {
        return state.events.filter((event) => !getFirstHitInfo(event).first);
      }
      const wanted = safeNumber(filterValue, 0);
      return state.events.filter((event) => safeNumber(getFirstHitInfo(event).first, 0) === wanted);
    }

    function renderFirstHitControls(events, attemptsWindow) {
      const distribution = computeFirstHitDistribution(events, attemptsWindow);
      const current = String(firstHitFilter.value || '').trim();
      firstHitFilter.innerHTML = [
        '<option value="">Todos os eventos</option>',
        ...Array.from({ length: distribution.maxAttempt }, (_, index) => {
          const attempt = index + 1;
          const count = safeNumber(distribution.byAttempt[String(attempt)], 0);
          return `<option value="${attempt}">Somente ${attempt}ª jogada (${count})</option>`;
        }),
        `<option value="no-hit">Sem acerto (${distribution.noHit})</option>`,
      ].join('');
      if (
        current &&
        Array.from(firstHitFilter.options).some((option) => option.value === current)
      ) {
        firstHitFilter.value = current;
      }

      firstHitDistributionEl.innerHTML = [
        ...Array.from({ length: distribution.maxAttempt }, (_, index) => {
          const attempt = index + 1;
          const count = safeNumber(distribution.byAttempt[String(attempt)], 0);
          return `<span class="distribution-chip"><strong>${attempt}ª</strong> ${count}</span>`;
        }),
        `<span class="distribution-chip"><strong>Sem hit</strong> ${distribution.noHit}</span>`,
      ].join('');
    }

    function renderCards(cards) {
      summaryCardsEl.innerHTML = cards.map((card) => `
        <div class="card">
          <div class="label">${escapeHtml(card.label)}</div>
          <div class="value">${escapeHtml(card.value)}</div>
          <div class="sub">${card.sub || ''}</div>
        </div>
      `).join('');
    }

    function renderEventRows(items) {
      if (!Array.isArray(items) || !items.length) {
        return `<tr><td colspan="7" class="muted">Nenhum evento retornado para esta run.</td></tr>`;
      }
      return items.map((event) => {
        const firstHit = getFirstHitInfo(event);
        const isCancelledInverted = String(event.status || '').toLowerCase() === 'cancelled_inverted';
        const invertedOffset = safeNumber(event?.inverted_evaluation?.first_hit_offset, 0) || null;
        const firstHitText = isCancelledInverted ? 'Cancelada' : (firstHit.first ? `Jogada ${firstHit.first}` : 'Sem acerto');
        const secondHitText = isCancelledInverted
          ? (invertedOffset ? `Invertida em -${invertedOffset}` : 'Batida invertida')
          : (firstHit.nextGap ? `Proximo em +${firstHit.nextGap}` : (firstHit.first ? 'Sem 2o acerto' : '-'));
        const createdAt = event.created_at_utc || event.anchor_timestamp_utc || null;
        return `
          <tr>
            <td>${escapeHtml(dateTime(createdAt))}</td>
            <td>${numberBubble(event.anchor_number)}</td>
            <td>${rankingChips(event.ranking_details || event.ranking || [])}</td>
            <td>${badge(event.status || '-')}</td>
            <td><span class="attempt-track">${buildAttemptDots(event)}</span></td>
            <td>
              ${escapeHtml(firstHitText)}
              <span class="timing-note">${escapeHtml(secondHitText)}</span>
            </td>
            <td>${escapeHtml(event.summary || '-')}</td>
          </tr>
        `;
      }).join('');
    }

    function rerenderEvents() {
      const rows = filteredEvents();
      eventsBody.innerHTML = renderEventRows(rows);
      eventsEmptyEl.style.display = rows.length ? 'none' : 'block';
      eventsContentEl.style.display = 'block';
      if (!rows.length) {
        eventsEmptyEl.textContent = 'Nenhum evento encontrado para o filtro selecionado.';
      } else {
        eventsEmptyEl.textContent = 'Nenhum evento carregado.';
      }
    }

    function canDeleteRun(run) {
      const status = String(run?.status || '').toLowerCase();
      return !['running', 'scheduled'].includes(status);
    }

    async function fetchJson(url, options = undefined) {
      const response = await fetch(url, options);
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.detail || payload.message || `HTTP ${response.status}`);
      }
      return payload;
    }

    async function loadRun() {
      if (!runId) {
        throw new Error('run_id ausente na URL.');
      }
      const payload = await fetchJson(`/api/occurrences/runs/${encodeURIComponent(runId)}?events_limit=500`);
      const run = payload.run || null;
      const events = payload.events || [];
      if (!run) {
        throw new Error('Run nao encontrada.');
      }
      state.run = run;
      state.events = Array.isArray(events) ? events : [];

      const timing = computeRunTimingStats(state.events);
      heroCopy.textContent = `Run ${run.run_id} | tipo ${run.mode || '-'} | roleta ${run.roulette_id || '-'} | criada em ${dateTime(run.created_at_utc)}`;
      renderCards([
        { label: 'Tipo', value: run.mode || '-', sub: `Status ${run.status || '-'}` },
        { label: 'Roleta', value: run.roulette_id || '-', sub: `${payload.total_events || state.events.length} evento(s)` },
        {
          label: 'Ranking monitorado',
          value: run.config?.ranking_size ?? '-',
          sub: `${run.entries_processed ?? run.generated_events ?? run.entries_analyzed ?? 0} gatilho(s)`,
        },
        { label: 'Jogadas monitoradas', value: run.config?.attempts_window ?? '-', sub: `${run.pending_events ?? 0} pendente(s)` },
        { label: 'Canceladas invertidas', value: run.cancelled_inverted_events ?? 0, sub: `${run.entries_analyzed ?? 0} validadas` },
        { label: 'Hits totais', value: run.total_hits ?? 0, sub: `${run.total_attempts ?? 0} tentativas` },
        { label: '1o acerto medio', value: timing.avgFirstHit ? `${timing.avgFirstHit.toFixed(2)} jog.` : '-', sub: `${timing.firstHitSamples} evento(s) com acerto` },
        { label: 'Proximo acerto apos o 1o', value: timing.avgSecondGap ? `+${timing.avgSecondGap.toFixed(2)} jog.` : '-', sub: `${timing.secondGapSamples} evento(s) com 2 acertos` },
        { label: 'Hit rate evento', value: pct(run.event_hit_rate || 0), sub: `${run.events_with_hits ?? 0} evento(s) com hit` },
      ]);

      renderFirstHitControls(state.events, run.config?.attempts_window);
      rerenderEvents();

      if (canDeleteRun(run)) {
        deleteBtn.style.display = 'inline-flex';
        deleteBtn.onclick = async () => {
          const confirmed = window.confirm('Excluir esta run e todos os eventos associados?');
          if (!confirmed) return;
          setStatus('Excluindo run...');
          try {
            const result = await fetchJson(`/api/occurrences/runs/${encodeURIComponent(run.run_id)}`, { method: 'DELETE' });
            setStatus(`Run excluida. ${result.deleted_event_count} evento(s) removido(s).`, 'success');
            window.setTimeout(() => {
              window.location.href = '/occurrences-runs';
            }, 700);
          } catch (error) {
            setStatus(`Falha ao excluir run: ${error.message}`, 'error');
          }
        };
      }
    }

    loadRun()
      .then(() => setStatus(`Detalhes carregados para ${runId}.`, 'success'))
      .catch((error) => {
        setStatus(`Falha ao carregar a run: ${error.message}`, 'error');
        heroCopy.textContent = 'Nao foi possivel carregar os detalhes da execucao.';
      });

    firstHitFilter.addEventListener('change', rerenderEvents);
  </script>
</body>
</html>
