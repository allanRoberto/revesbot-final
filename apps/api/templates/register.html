<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
    }

    .link-welcome {
        margin: 40px auto 5px auto;
    text-align: center;
    width: 100%;
    display: flex
;
    justify-content: center;
    text-decoration: none;
    font-size: 12px;
    color: #999;
    }

    .login-card {
      background: #fff;
      padding: 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 450px;
    }

    .login-card h4 {
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #2c5364;
      text-align: center;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #2c5364;
    }

    .btn-primary {
      background-color: #2c5364;
      border-color: #2c5364;
    }

    .btn-primary:hover {
      background-color: #1b2d3a;
      border-color: #1b2d3a;
    }

    .error, .success {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }

    .error {
      color: red;
    }

    .success {
      color: green;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h4>Crie sua Conta</h4>
    <form id="register-form">
      <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" id="name" name="name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Telefone</label>
        <input type="tel" class="form-control" id="phone" name="phone" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirme a Senha</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Cadastrar</button>

      <a href="/login" class="link-welcome">Voltar para o login</a>

      <p id="register-message"></p>
    </form>
  </div>

  <script>
    document.getElementById("register-form").addEventListener("submit", async function (event) {
      event.preventDefault();

      const form = event.target;
      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const phone = form.phone.value.trim();
      const password = form.password.value;
      const confirmPassword = form.confirm_password.value;
      const messageEl = document.getElementById("register-message");

      if (password !== confirmPassword) {
        messageEl.textContent = "As senhas não coincidem.";
        messageEl.className = "error";
        return;
      }

      try {
        const response = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, phone, password })
        });

        const result = await response.json();
        if (response.ok) {
          messageEl.textContent = result.message;
          messageEl.className = "success";
          form.reset();
        } else {
          messageEl.textContent = result.detail || "Erro ao cadastrar.";
          messageEl.className = "error";
        }
      } catch (err) {
        messageEl.textContent = "Erro de conexão com o servidor.";
        messageEl.className = "error";
      }
    });
  </script>

</body>
</html>
