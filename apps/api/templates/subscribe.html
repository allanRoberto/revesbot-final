<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Assine o Plano</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      padding: 2rem;
      border-radius: 10px;
      background: #ffffff10;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    p, h3 {
      color: #fff;
    }


    .btn-custom {
      background-color: #ffc107;
      border-color: #ffc107;
      color: #000;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h3 class="mb-4">Assine o Plano Premium</h3>
    <p class="mb-4">Tenha 3 dias grátis de acesso completo ao painel de sinais Revesbot.</p>
    <button onclick="startCheckout()" class="btn btn-custom btn-lg w-100">Assinar agora</button>
    <p id="error" class="mt-3 text-danger fw-bold"></p>
  </div>

  <script>
    async function startCheckout() {
      try {
        const res = await fetch("/checkout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          }
          // ❗ não usa Authorization aqui, pois o backend já usa o cookie
        });

        const data = await res.json();
        if (res.ok && data.checkout_url) {
          window.location.href = data.checkout_url;
        } else {
          document.getElementById("error").innerText = data.detail || "Erro ao iniciar o pagamento.";
        }
      } catch (err) {
        document.getElementById("error").innerText = "Erro de conexão com o servidor.";
      }
    }
  </script>

</body>
</html>
